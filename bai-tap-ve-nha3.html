<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1><B>Car Purchase Form</B></h1>
    <form action="submit_car_purchase.php" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" required><br><br>

        <label for="Choose a car">Choose a car:</label>
        <select id="Choose a car" name="Choose a car" required>
            <option value="">Model 1 </option>
            <option value="sedan">Sedan</option>
            <option value="suv">SUV</option>
            <option value="truck">Truck</option>
            <option value="coupe">Coupe</option>
        </select><br><br>

        <label for="Choose a color">Choose a color:</label>
        <select id="Choose a color" name="Choose a color" required>
            <option value="">Red</option>
            <option value="blue">Blue</option>
            <option value="black">Black</option>
            <option value="white">White</option>
            <option value="silver">Silver</option>
        </select><br><br>
       <label for="Quantity">Quantity:</label>
     <input type="number" id="Quantity" name="Quantity" min="1" max="10" required><br><br>
        <label for="Delivery date">Delivery date:</label><br>
         <input type="date" id="Delivery date" name="Delivery date" required><br><br>

        <input type="submit" value="Submit">

</body>
</html>
